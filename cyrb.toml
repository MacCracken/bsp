name = "bsp"
version = "0.7.0"
license = "GPL-3.0-only"
description = "BSP — Binary Space Partitioning. Spatial geometry primitives for Cyrius."
repository = "https://github.com/MacCracken/bsp"

[lib]
entry = "src/lib.cyr"
modules = [
    "src/fixed.cyr",
    "src/aabb.cyr",
    "src/intersect.cyr",
    "src/tree.cyr",
    "src/traverse.cyr",
    "src/query.cyr",
    "src/blockmap.cyr",
    "src/frustum.cyr",
]

[deps]
stdlib = ["string", "alloc", "vec", "fmt"]

[[test]]
name = "bsp"
entry = "tests/bsp.tcyr"

[[bench]]
name = "bsp"
entry = "benches/bsp.bcyr"
