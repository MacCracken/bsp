name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CYRIUS_VERSION: "3.2.5"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "Cyrius $CYRIUS_VERSION installed"

      - name: Test
        run: |
          for t in tests/*.tcyr; do
            [ -f "$t" ] || continue
            name=$(basename "$t" .tcyr)
            tmpbin="/tmp/bsp_test_$$"
            cat "$t" | cc3 > "$tmpbin" 2>/dev/null && chmod +x "$tmpbin"
            ec=0; output=$("$tmpbin" 2>&1) || ec=$?
            rm -f "$tmpbin"
            summary=$(echo "$output" | grep -o '[0-9]* passed, [0-9]* failed' | tail -1)
            f=$(echo "$summary" | grep -o '[0-9]* failed' | grep -o '^[0-9]*' || echo "")
            if [ "$ec" -ne 0 ] || { [ -n "$f" ] && [ "$f" -gt 0 ]; }; then
              echo "FAIL: $name (exit $ec)${summary:+ ($summary)}"
              echo "$output" | grep "FAIL:" | head -3
              exit 1
            fi
            echo "PASS: $name${summary:+ ($summary)}"
          done

      - name: Bench
        run: |
          for b in benches/*.bcyr; do
            [ -f "$b" ] || continue
            name=$(basename "$b" .bcyr)
            tmpbin="/tmp/bsp_bench_$$"
            cat "$b" | cc3 > "$tmpbin" 2>/dev/null && chmod +x "$tmpbin"
            echo "=== $name ==="
            "$tmpbin" 2>&1 || true
            rm -f "$tmpbin"
          done
        continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No syscalls in pure geometry
        run: |
          if grep -rn 'syscall(' src/ 2>/dev/null | grep -v "# "; then
            echo "FAIL: syscalls in pure geometry library"; exit 1
          fi
          echo "PASS: no syscalls"

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs
        run: |
          MISSING=0
          for doc in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md LICENSE; do
            if [ -f "$doc" ]; then echo "  OK: $doc"; else echo "  MISSING: $doc"; MISSING=1; fi
          done
          exit $MISSING
      - name: Verify version consistency
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION: $VERSION"
          grep -q "$VERSION" CHANGELOG.md || { echo "FAIL: version not in changelog"; exit 1; }
          echo "Version consistent"
